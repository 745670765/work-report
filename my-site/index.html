<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李东霖 - 2026 Work Performance Report</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM (UMD版本) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- 引入 Babel 用于在浏览器中实时编译 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 全局重置基础样式，防止浏览器默认间距影响 */
    body, html { margin: 0; padding: 0; background-color: #09090B; overflow-x: hidden; }
  </style>
</head>
<body>
  <!-- React 应用挂载点 -->
  <div id="root"></div>

  <!-- React 业务逻辑代码 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 重写图标组件 (替代 lucide-react，便于单文件无依赖运行) ---
    const MousePointer2 = ({ size = 24, color = "currentColor", fill = "none", className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></svg>
    );
    const ChevronDown = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>
    );
    const ChevronLeft = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
    );
    const ChevronRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );
    const Upload = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    );
    const X = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    );
    const Plus = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    );

    // =========================================================================
    // 🔴 必看：发布到 GitHub / Netlify 分享专用配置
    // =========================================================================
    // 浏览器里的“上传”只能存在你自己的电脑缓存中，别人通过链接是看不到的。
    // 如果你要分享给别人看，请把图片和 index.html 放在同一个文件夹，
    // 然后去掉下面的 "//" 注释，把你图片的名字写在这里！代码会自动加载它们。
    // -------------------------------------------------------------------------
    const PRELOAD_WORKS = [
      { id: 'img1', url: './images/1.jpg', name: '作品1' },
      { id: 'img2', url: './images/2.jpg', name: '作品2' },
      { id: 'img3', url: './images/3.jpg', name: '作品3' },
      { id: 'img4', url: './images/4.jpg', name: '作品4' },
      { id: 'img5', url: './images/5.jpg', name: '作品5' },
      { id: 'img6', url: './images/6.jpg', name: '作品6' },
      { id: 'img7', url: './images/7.jpg', name: '作品7' },
      { id: 'img8', url: './images/8.jpg', name: '作品8' },
      { id: 'img9', url: './images/9.jpg', name: '作品9' },
      { id: 'img10', url: './images/10.jpg', name: '作品10' },
    ];
    // =========================================================================

    // --- 配置与颜色常量 ---
    const COLORS = {
      purple: '#D946EF',
      cyan: '#06B6D4',
      red: '#EF4444', 
    };

    // --- 基础组件：流体渐变背景 ---
    const FluidBackground = ({ time }) => {
      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
          <div className="absolute inset-0 opacity-60 filter blur-[120px]">
            <div
              className="absolute top-1/2 left-1/2 w-[70vw] h-[70vh] bg-blue-600 rounded-full"
              style={{ transform: `translate(-50%, -50%) translate(${Math.sin(time * 0.6) * 25}vw, ${Math.cos(time * 0.8) * 20}vh) scale(${1 + Math.sin(time * 1.0) * 0.2})` }}
            />
            <div
              className="absolute top-1/2 left-1/2 w-[60vw] h-[60vh] bg-purple-600 rounded-full"
              style={{ transform: `translate(-50%, -50%) translate(${Math.cos(time * 0.8) * -20}vw, ${Math.sin(time * 0.6) * 25}vh) scale(${1 + Math.cos(time * 0.8) * 0.1})` }}
            />
            <div
              className="absolute top-1/2 left-1/2 w-[65vw] h-[65vh] bg-red-600 rounded-full"
              style={{ transform: `translate(-50%, -50%) translate(${Math.sin(time * 0.4) * 30}vw, ${Math.cos(time * 1.0) * -25}vh) scale(${1 + Math.sin(time * 0.3) * 0.15})` }}
            />
            <div
              className="absolute top-1/2 left-1/2 w-[55vw] h-[55vh] bg-orange-600 rounded-full"
              style={{ transform: `translate(-50%, -50%) translate(${Math.cos(time * 1.0) * -30}vw, ${Math.sin(time * 0.4) * -20}vh) scale(${1 + Math.cos(time * 0.8) * 0.2})` }}
            />
          </div>
        </div>
      );
    };

    // --- 基础组件：背景网格 ---
    const GridBackground = () => (
      <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div 
          className="absolute inset-0 opacity-[0.35]"
          style={{
            backgroundImage: `
              linear-gradient(to right, #333 1px, transparent 1px),
              linear-gradient(to bottom, #333 1px, transparent 1px)
            `,
            backgroundSize: '40px 40px'
          }}
        />
      </div>
    );

    // --- 基础组件：Figma风格选中框 ---
    const BoundingBox = ({ children, color, active = false }) => (
      <div className={`relative inline-block transition-colors duration-300 ${active ? 'ring-1' : ''}`} style={{ ringColor: color }}>
        {children}
        {active && (
          <React.Fragment>
            <div className="absolute -top-1 -left-1 w-2 h-2 bg-white" style={{ border: `1px solid ${color}` }}></div>
            <div className="absolute -top-1 -right-1 w-2 h-2 bg-white" style={{ border: `1px solid ${color}` }}></div>
            <div className="absolute -bottom-1 -left-1 w-2 h-2 bg-white" style={{ border: `1px solid ${color}` }}></div>
            <div className="absolute -bottom-1 -right-1 w-2 h-2 bg-white" style={{ border: `1px solid ${color}` }}></div>
          </React.Fragment>
        )}
      </div>
    );

    // --- 微件1：钢笔工具绘制路径 ---
    const PenToolWidget = ({ time }) => {
      const offset = Math.sin(time * 2); 
      const cx = 80 + offset * 40; 
      const cy = 30 + Math.cos(time * 2) * 20; 

      return (
        <div className="absolute top-[20%] left-[10%] z-10 w-[160px]">
          <div className="text-white font-mono text-[10px] mb-2">Pen Tool</div>
          <div className="relative w-full h-[100px]">
            <svg width="160" height="100" className="overflow-visible absolute top-0 left-0 z-0">
              <path 
                d={`M 20 80 C 60 80, ${cx} ${cy}, 140 80`}
                fill="transparent" 
                stroke="#06B6D4" 
                strokeWidth="2" 
              />
              <line x1="140" y1="80" x2={cx} y2={cy} stroke="#71717A" strokeWidth="1" strokeDasharray="2 2" />
              <rect x="17" y="77" width="6" height="6" fill="white" stroke="#06B6D4" strokeWidth="1.5" />
              <rect x="137" y="77" width="6" height="6" fill="white" stroke="#06B6D4" strokeWidth="1.5" />
              <circle cx={cx} cy={cy} r="4" fill="white" stroke="#06B6D4" strokeWidth="1.5" />
            </svg>
            <div 
              className="absolute pointer-events-none z-10" 
              style={{ left: cx, top: cy, transform: 'translate(-2px, -2px)' }}
            >
              <MousePointer2 size={18} color="#06B6D4" fill="#06B6D4" className="-rotate-12 drop-shadow-md" />
            </div>
          </div>
        </div>
      );
    };

    // --- 微件2：矩形数值输入 ---
    const RectangleInputWidget = ({ time }) => {
      const cycle = time % 4; 
      let text = "";
      if (cycle < 0.5) text = "19";
      else if (cycle < 0.8) text = "192";
      else if (cycle < 2.0) text = "1920";
      else if (cycle < 2.3) text = "192";
      else if (cycle < 2.5) text = "19";
      else if (cycle < 2.7) text = "1";
      else text = "";

      const isBlinking = (time * 2) % 1 > 0.5;

      return (
        <div className="absolute bottom-[20%] left-[15%] z-20 font-mono text-xs">
          <div className="bg-white/[0.08] backdrop-blur-[2px] border border-white/20 rounded-md p-3 w-40 shadow-lg">
            <div className="flex justify-between items-center text-white mb-3 text-[10px]">
              <span>Rectangle 1</span>
            </div>
            <div className="flex gap-2 mb-2">
              <div className="bg-transparent border border-white/10 px-2 py-1.5 rounded w-full flex items-center text-white relative ring-1 ring-cyan-500/50">
                <span className="text-white w-4">W</span>
                <span>{text}</span>
                <span className={`w-[2px] h-3.5 bg-cyan-400 ml-[1px] ${isBlinking ? 'opacity-100' : 'opacity-0'}`} />
              </div>
            </div>
            <div className="flex gap-2">
              <div className="bg-transparent border border-white/10 px-2 py-1.5 rounded w-full flex items-center text-white">
                <span className="text-white w-4">H</span>
                <span>1080</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 微件3：渐变滑块调整 ---
    const GradientWidget = ({ time }) => {
      const progress = (Math.sin(time * 1.5) + 1) / 2; 
      const trackWidth = 152; 
      const thumbX = progress * (trackWidth - 16); 
      
      const color1 = '#EF4444'; 
      const color2 = '#06B6D4'; 

      return (
        <div className="absolute bottom-[20%] right-[15%] z-20 font-mono text-xs">
          <div className="bg-white/[0.08] backdrop-blur-[2px] border border-white/20 p-3 rounded-md w-44 shadow-lg">
            <div className="text-[10px] text-white mb-3 flex justify-between">
              <span>Fill</span>
              <span>Linear</span>
            </div>
            
            <div 
              className="h-6 w-full rounded-sm mb-4 border border-white/15 shadow-inner opacity-90" 
              style={{ background: `linear-gradient(to right, ${color1} ${progress * 100}%, ${color2})` }} 
            />
            
            <div className="relative h-2 bg-black/30 border border-white/10 rounded-full w-full mx-auto">
              <div className="absolute top-1/2 -mt-2 -ml-2 w-4 h-4 bg-white rounded-full border-[3px] border-red-500 shadow-md z-10" style={{ left: 0 }} />
              <div className="absolute top-1/2 -mt-2 -ml-2 w-4 h-4 bg-white rounded-full border-[3px] border-cyan-500 shadow-md z-20" style={{ left: thumbX }} />
              <div 
                className="absolute pointer-events-none z-30" 
                style={{ left: thumbX, top: 4, transform: 'translate(-2px, -2px)' }}
              >
                <MousePointer2 size={18} color="#06B6D4" fill="#06B6D4" className="-rotate-12 drop-shadow-md" />
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 重写：作品集大图垂直展示板块 ---
    const PortfolioWorksSection = () => {
      // 初始化状态：合并配置区作品和本地缓存作品
      const [works, setWorks] = useState(() => {
        let savedWorks = [];
        try {
          const localData = localStorage.getItem('portfolio_works_memory');
          if (localData) {
            savedWorks = JSON.parse(localData);
          }
        } catch (e) {
          console.error("无法读取本地缓存", e);
        }
        // 防止代码写死的图片和缓存重复
        const preloadUrls = PRELOAD_WORKS.map(w => w.url);
        const filteredSaved = savedWorks.filter(w => !preloadUrls.includes(w.url));
        return [...PRELOAD_WORKS, ...filteredSaved];
      });

      const [activeImageIndex, setActiveImageIndex] = useState(null);
      const fileInputRef = useRef(null);

      // 将非预设代码中的图片持久化到浏览器缓存中
      const saveToLocalMemory = (updatedWorks) => {
        // 只缓存手动上传的，不管预设的
        const worksToSave = updatedWorks.filter(w => !PRELOAD_WORKS.some(p => p.id === w.id));
        try {
          localStorage.setItem('portfolio_works_memory', JSON.stringify(worksToSave));
        } catch (e) {
          console.warn("图片过大，超出了浏览器 5MB 的本地缓存限制，重启后可能无法记忆最新上传的图片。");
        }
      };

      // 上传逻辑 (使用 Base64 转码以支持记忆功能)
      const handleUpload = (e) => {
        const files = Array.from(e.target.files);
        
        const newWorksPromises = files.map(file => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              resolve({
                id: Math.random().toString(36).substr(2, 9),
                url: event.target.result, // 转换为可保存的 Base64 字符串
                name: file.name
              });
            };
            reader.readAsDataURL(file);
          });
        });

        Promise.all(newWorksPromises).then(newWorks => {
          setWorks(prev => {
            const updated = [...prev, ...newWorks];
            saveToLocalMemory(updated);
            return updated;
          });
        });
      };

      // 删除逻辑
      const removeWork = (id) => {
        setWorks(prev => {
          const updated = prev.filter(w => w.id !== id);
          saveToLocalMemory(updated);
          return updated;
        });
      };

      // 监听键盘左右键与ESC键
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (activeImageIndex === null) return;
          if (e.key === 'ArrowRight') {
            setActiveImageIndex(prev => (prev + 1) % works.length);
          } else if (e.key === 'ArrowLeft') {
            setActiveImageIndex(prev => (prev - 1 + works.length) % works.length);
          } else if (e.key === 'Escape') {
            setActiveImageIndex(null);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [activeImageIndex, works.length]);

      return (
        <div className="relative z-10 w-3/4 mx-auto pt-4 pb-32 min-h-screen">
          {/* 标题控制栏 */}
          <div className="flex justify-between items-end mb-8 border-b border-white/10 pb-4">
            <div>
              <h2 className="text-white text-3xl font-black tracking-tighter mb-2">SELECTED WORKS</h2>
              <p className="text-white font-mono text-xs uppercase tracking-[0.3em]">Exhibition / Portfolio / 2026</p>
            </div>
          </div>

          <input 
            type="file" 
            ref={fileInputRef} 
            onChange={handleUpload} 
            multiple 
            accept="image/*" 
            className="hidden" 
          />

          {/* 作品列表：完全无缝贴合，去除所有边框、圆角和背景框 */}
          <div className="flex flex-col gap-0">
            {works.map((work, index) => (
              <div 
                key={work.id} 
                className="relative group w-full overflow-hidden cursor-pointer"
                onClick={() => setActiveImageIndex(index)}
              >
                {/* 移除 16:9 限制，改用 h-auto 使图片自然堆叠，无缝连接 */}
                <img 
                  src={work.url} 
                  alt={work.name} 
                  className="w-full h-auto block transition-transform duration-1000 group-hover:scale-[1.03]" 
                />
                
                {/* 删除按钮 */}
                <button 
                  onClick={(e) => { 
                    e.stopPropagation(); // 阻止点击删除按钮时触发背景的放大图片事件
                    removeWork(work.id); 
                  }}
                  className="absolute bottom-4 right-6 p-2 bg-black/30 hover:bg-black/60 backdrop-blur-md rounded border border-white/10 text-white/50 hover:text-white transition-all duration-300 opacity-0 group-hover:opacity-100 z-10"
                  title="Remove work"
                >
                  <X size={16} />
                </button>
              </div>
            ))}

            {/* 延续上传按钮 */}
            <div 
              className="group relative w-full aspect-video border-2 border-dashed border-white/5 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all duration-500 hover:bg-white/[0.03] hover:border-cyan-500/30"
              onClick={() => fileInputRef.current?.click()}
            >
              <div className="w-16 h-16 rounded-full bg-white/[0.05] flex items-center justify-center mb-6 ring-1 ring-white/10 group-hover:ring-cyan-500/50 group-hover:scale-110 transition-all duration-500">
                <Plus className="text-white group-hover:text-cyan-400" size={32} />
              </div>
              <p className="text-white font-mono text-xs tracking-[0.3em] uppercase transition-colors group-hover:text-white">
                {works.length > 0 ? "Add Next Work" : "Upload First Masterpiece"}
              </p>
            </div>
          </div>

          {/* 底部装饰信息 */}
          <div className="mt-32 flex justify-between items-center text-white font-mono text-[10px] uppercase tracking-[0.4em] border-t border-white/5 pt-12">
            <span>Displaying {works.length} Items</span>
            <span>Portfolio 2026 Production</span>
          </div>

          {/* --- 全屏放大查看器 (Lightbox) --- */}
          {activeImageIndex !== null && (
            <div 
              className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-xl transition-all duration-500"
              onClick={() => setActiveImageIndex(null)} // 点击背景关闭
            >
              {/* 关闭按钮 */}
              <button 
                className="absolute top-8 right-8 text-white/50 hover:text-white transition-colors"
                onClick={() => setActiveImageIndex(null)}
              >
                <X size={36} />
              </button>

              {/* 左侧箭头 */}
              {works.length > 1 && (
                <button 
                  className="absolute left-8 text-white/30 hover:text-white transition-colors p-4"
                  onClick={(e) => { 
                    e.stopPropagation(); 
                    setActiveImageIndex((activeImageIndex - 1 + works.length) % works.length); 
                  }}
                >
                  <ChevronLeft size={48} />
                </button>
              )}

              {/* 核心展示图片 */}
              <img 
                src={works[activeImageIndex].url} 
                alt={works[activeImageIndex].name} 
                className="max-w-[90vw] max-h-[90vh] object-contain drop-shadow-2xl cursor-default"
                onClick={(e) => e.stopPropagation()} // 点击图片本身不会关闭全屏
              />

              {/* 右侧箭头 */}
              {works.length > 1 && (
                <button 
                  className="absolute right-8 text-white/30 hover:text-white transition-colors p-4"
                  onClick={(e) => { 
                    e.stopPropagation(); 
                    setActiveImageIndex((activeImageIndex + 1) % works.length); 
                  }}
                >
                  <ChevronRight size={48} />
                </button>
              )}

              {/* 底部页码指示器 */}
              <div className="absolute bottom-8 left-1/2 -translate-x-1/2 text-white/50 font-mono text-xs tracking-[0.3em]">
                {activeImageIndex + 1} / {works.length}
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- 主应用 ---
    function App() {
      const [time, setTime] = useState(0);

      useEffect(() => {
        let req;
        const startTime = Date.now();
        const tick = () => {
          setTime((Date.now() - startTime) / 1000);
          req = requestAnimationFrame(tick);
        };
        req = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(req);
      }, []);

      const cycleTime = time % 3;
      const titleChars = ['述', '职', '报', '告'];
      let cursorIndex = Math.floor(cycleTime / 0.25);
      if (cursorIndex > 4) cursorIndex = 4;
      if (cycleTime >= 2.5) cursorIndex = -1;

      const scrollToWorks = () => {
        window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
      };

      return (
        <div className="relative w-full bg-[#09090B] selection:bg-purple-500/30 overflow-x-hidden scroll-smooth">
          <FluidBackground time={time} />
          <GridBackground />

          {/* --- 第一屏：Hero 动画 --- */}
          <section className="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
            
            <div className="absolute top-6 left-8 flex items-center gap-3 z-20">
              <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center">
                <div className="w-2.5 h-2.5 rounded-full bg-black"></div>
              </div>
              <span className="text-white font-bold tracking-tight text-lg">Donglin.</span>
            </div>

            <div className="relative z-10 pointer-events-none text-center">
              <div className="text-white font-mono text-xs md:text-sm tracking-[0.2em] mb-4 uppercase">
                lidonglin the design work
              </div>

              <BoundingBox color={COLORS.red} active={true}>
                <h1 className="text-6xl md:text-8xl lg:text-[120px] font-black tracking-tighter leading-none relative flex items-center">
                  <span className="text-white">李东霖</span>
                  <div className="flex items-center ml-2 md:ml-4">
                    {cursorIndex === 0 && <div className="w-1.5 md:w-2.5 h-[0.8em] bg-red-500 animate-pulse mx-1 md:mx-2 rounded-sm" />}
                    {titleChars.map((char, i) => {
                      const isFilled = cycleTime > (i + 1) * 0.25 && cycleTime < 2.5;
                      return (
                        <React.Fragment key={i}>
                          <span
                            className="transition-all duration-500 ease-in-out"
                            style={{
                              color: isFilled ? '#ffffff' : 'transparent',
                              WebkitTextStroke: isFilled ? '2px #ffffff' : '2px #71717a'
                            }}
                          >
                            {char}
                          </span>
                          {cursorIndex === i + 1 && <div className="w-1.5 md:w-2.5 h-[0.8em] bg-red-500 animate-pulse mx-1 md:mx-2 rounded-sm" />}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </h1>
              </BoundingBox>

              <div className="mt-4 relative inline-block">
                 <h2 
                   className="text-3xl md:text-5xl lg:text-7xl font-bold tracking-tight text-transparent"
                   style={{ WebkitTextStroke: '1px rgba(255,255,255,0.2)' }}
                 >
                   2026 Work Performance Report
                 </h2>
              </div>
              
              <div className="mt-8 text-white font-mono text-xs">
                © 2026
              </div>
            </div>

            <PenToolWidget time={time} />
            <RectangleInputWidget time={time} />
            <GradientWidget time={time} />

            {/* 向下滑动指示器 */}
            <div 
              className="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 cursor-pointer z-30 group"
              onClick={scrollToWorks}
            >
              <span className="text-white font-mono text-[9px] uppercase tracking-[0.4em] transition-colors group-hover:text-white">
                向下滑动查看
              </span>
              <div className="p-2 rounded-full border border-white/10 group-hover:border-white/30 transition-all group-hover:translate-y-1">
                <ChevronDown className="text-white animate-bounce group-hover:text-white" size={20} />
              </div>
            </div>
          </section>

          {/* --- 第二屏：垂直大图展示 --- */}
          <section className="relative w-full">
            <PortfolioWorksSection />
          </section>

          <footer className="relative z-10 py-12 text-center text-white font-mono text-[9px] uppercase tracking-[0.8em]">
            Design Engineering by Donglin / Portfolio 2026
          </footer>
        </div>
      );
    }

    // 渲染根节点
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
